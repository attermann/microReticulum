; Interop-test sender: builds a native binary that announces a destination,
; waits for an announce from the Python peer, opens a Link, and sends a
; Resource with a deterministic payload. Exits with status 0 on resource
; conclude=COMPLETE, 1 on timeout/error.

[env]
monitor_speed = 115200
build_type = debug
build_flags =
	-DRNS_USE_FS
	-DRNS_PERSIST_PATHS
	-DUSTORE_USE_UNIVERSALFS
	; Point-to-point loopback to the Python receiver:
	;   Python listens on 14242, sends to 127.0.0.1:14243
	;   C++    listens on 14243, sends to 127.0.0.1:14242
	; Broadcast (255.255.255.255) doesn't reliably loop between two
	; processes on macOS, so we explicitly target 127.0.0.1.
	-DDEFAULT_UDP_LOCAL_HOST=\"127.0.0.1\"
	-DDEFAULT_UDP_REMOTE_HOST=\"127.0.0.1\"
	-DDEFAULT_UDP_LOCAL_PORT=14243
	-DDEFAULT_UDP_REMOTE_PORT=14242
	; The library's project-root platformio.ini defines these debug flags
	; and Transport.cpp:4584-4586 unconditionally references variables
	; defined only under -DRNS_DEBUG_MEMORY. Mirror the flag set so the
	; example builds without modifying the library code.
	-DRNS_DEBUG_HEAP
	-DRNS_DEBUG_MEMORY
	-DRNS_DEBUG_METRICS
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	microReticulum=symlink://../..
	udp_interface=symlink://../../examples/common/udp_interface

[env:native17]
platform = native
build_unflags = -std=gnu++11
build_flags =
	${env.build_flags}
	-std=c++17
	-g3
	-Wall
	-Wextra
	-Wno-missing-field-initializers
	-Wno-format
	-Wno-unused-parameter
	-DNATIVE
lib_deps =
	${env.lib_deps}
lib_extra_dirs = ../
lib_compat_mode = off
