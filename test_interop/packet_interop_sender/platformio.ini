; Interop-test sender for the basic packet-exchange scenario.
; Bidirectional: C++ sends a packet to Python's destination AND receives
; a packet from Python. Exits 0 iff both directions match.

[env]
monitor_speed = 115200
build_type = debug
build_flags =
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	; Point-to-point loopback on a dedicated port pair so multiple
	; interop tests can in principle coexist without UDP collision.
	-DDEFAULT_UDP_LOCAL_HOST=\"127.0.0.1\"
	-DDEFAULT_UDP_REMOTE_HOST=\"127.0.0.1\"
	-DDEFAULT_UDP_LOCAL_PORT=14253
	-DDEFAULT_UDP_REMOTE_PORT=14252
	; Mirror the library's debug flag set — Transport.cpp:4584-4586
	; references variables only declared under -DRNS_DEBUG_MEMORY.
	-DRNS_DEBUG_HEAP
	-DRNS_DEBUG_MEMORY
	-DRNS_DEBUG_METRICS
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	microReticulum=symlink://../..
	udp_interface=symlink://../../examples/common/udp_interface

[env:native17]
platform = native
build_unflags = -std=gnu++11
build_flags =
	${env.build_flags}
	-std=c++17
	-g3
	-Wall
	-Wextra
	-Wno-missing-field-initializers
	-Wno-format
	-Wno-unused-parameter
	-DNATIVE
lib_deps =
	${env.lib_deps}
lib_extra_dirs = ../
lib_compat_mode = off
