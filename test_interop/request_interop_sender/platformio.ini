; Interop-test sender for the link request/response scenario.
; Establishes a Link, sends a small request via Link::request("/echo", ...),
; verifies the response payload is byte-identical to what was sent.

[env]
monitor_speed = 115200
build_type = debug
build_flags =
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	-DDEFAULT_UDP_LOCAL_HOST=\"127.0.0.1\"
	-DDEFAULT_UDP_REMOTE_HOST=\"127.0.0.1\"
	-DDEFAULT_UDP_LOCAL_PORT=14257
	-DDEFAULT_UDP_REMOTE_PORT=14256
	-DRNS_DEBUG_HEAP
	-DRNS_DEBUG_MEMORY
	-DRNS_DEBUG_METRICS
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	microReticulum=symlink://../..
	udp_interface=symlink://../../examples/common/udp_interface

[env:native17]
platform = native
build_unflags = -std=gnu++11
build_flags =
	${env.build_flags}
	-std=c++17
	-g3
	-Wall
	-Wextra
	-Wno-missing-field-initializers
	-Wno-format
	-Wno-unused-parameter
	-DNATIVE
lib_deps =
	${env.lib_deps}
lib_extra_dirs = ../
lib_compat_mode = off
