; PlatformIO Project Configuration File
;
; encrypted_announce — password-protected identity + encrypted message storage
;
; Requires an SD card connected to the MCU (see SD_CS_PIN in main.cpp).
; This example is Arduino / ESP32 only — it depends on the SD, AES, CTR,
; SHA256, and RNG libraries from the Arduino ecosystem.

[env]
monitor_speed = 115200
upload_speed  = 460800
build_type    = debug
build_flags =
	-Wall
	-Wno-missing-field-initializers
	-Wno-format
	-DUSTORE_USE_UNIVERSALFS
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	;microStore=symlink://../../../microStore
	microReticulum=symlink://../..
	password=symlink://../../lib/password
	encrypted_store=symlink://../../lib/encrypted_store

[env:ttgo-t-beam]
framework = arduino
platform   = espressif32
board      = ttgo-t-beam
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

