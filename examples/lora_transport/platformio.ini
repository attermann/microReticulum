; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
monitor_speed = 115200
upload_speed = 460800
build_type = debug
build_unflags =
build_flags =
	-Wall
	-Wno-missing-field-initializers
	-Wno-format
	;-DRNS_MEM_LOG=1
	-DRNS_USE_FS
	-DRNS_PERSIST_PATHS
	-DUSTORE_USE_UNIVERSALFS
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	microReticulum=symlink://../..
	lora_interface=symlink://../common/lora_interface

[env:ttgo-lora32-v21]
framework = arduino
platform = espressif32
board = ttgo-lora32-v21
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DBOARD_LORA32_V21
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

[env:ttgo-t-beam]
framework = arduino
platform = espressif32
board = ttgo-t-beam
board_build.partitions = no_ota.csv
;board_build.partitions = huge_app.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DBOARD_TBEAM
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

[env:heltec-lora32-v3]
framework = arduino
platform = espressif32
board = heltec_wifi_lora_32_V3
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DBOARD_HELTEC_V3
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

[env:heltec-lora32-v4]
framework = arduino
platform = espressif32
; V4 uses ESP32-S3R2; no dedicated PlatformIO board yet — V3 definition is compatible
board = heltec_wifi_lora_32_V3
board_build.partitions = no_ota.csv
build_flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DBOARD_HELTEC_V4
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
monitor_filters = esp32_exception_decoder

[env:wiscore_rak4631]
framework = arduino
platform = nordicnrf52
;board = wiscore_rak4631
board = rak4630
board_build.variants_dir = variants
board_build.variant = rak4630
board_build.partitions = no_ota.csv
board_build.FileSystem = littlefs
build_unflags =
	${env.build_unflags}
	-fno-exceptions    ; Required for exception handling on nordicnrf52
	-fno-rtti          ; Required for exception handling on nordicnrf52
	--specs=nano.specs ; Required for exception handling on nordicnrf52
build_flags =
	${env.build_flags}
	-fexceptions        ; Required for exception handling on nordicnrf52
	-frtti              ; Required for exception handling on nordicnrf52
	--specs=nosys.specs ; Required for exception handling on nordicnrf52
	;-Wextra
	-DMCU_NRF52
	-DBOARD_RAK4631
	-DMSGPACK_USE_BOOST=OFF
	;-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_ALLOCATOR
	-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
	;-DRNS_CONTAINER_ALLOCATOR=RNS_HEAP_ALLOCATOR
	-DRNS_CONTAINER_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
	-DRNS_HEAP_POOL_BUFFER_SIZE=131072
lib_deps =
	${env.lib_deps}

[env:nrf52840_dk_adafruit]
framework = arduino
platform = nordicnrf52
board = nrf52840_dk_adafruit
monitor_speed = 115200
build_flags =
	${env.build_flags}
	;-Wextra
	-fexceptions
	-DMCU_NRF52
	-DRNS_USE_TLSF=1
	-DRNS_USE_ALLOCATOR=1
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}

[env:nrf52_dk]
framework = arduino
;framework = zephyr
platform = nordicnrf52
board = nrf52_dk
build_flags =
	${env.build_flags}
	;-Wextra
	-fexceptions
	-DMCU_NRF52
	-DRNS_USE_TLSF=1
	-DRNS_USE_ALLOCATOR=1
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env.lib_deps}
