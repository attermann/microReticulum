[env:native_debug]
platform = native
build_unflags =
	${env.build_unflags}
build_flags =
	${env.build_flags}
	-DNATIVE
	; CBA TEST
	;-fsanitize=address
	-fno-omit-frame-pointer
	-g
	;-O1
	-O0
    ;-DBOARD_HAS_PSRAM=1
	;-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_ALLOCATOR
	-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
	-DRNS_CONTAINER_ALLOCATOR=RNS_ALTHEAP_POOL_ALLOCATOR
	;-DRNS_HEAP_POOL_BUFFER_SIZE=81920
	;-DRNS_HEAP_POOL_BUFFER_SIZE=102400
	-DRNS_HEAP_POOL_BUFFER_SIZE=204800
	;-DRNS_HEAP_POOL_BUFFER_SIZE=307200
	;-DRNS_HEAP_POOL_BUFFER_SIZE=409600
	;-DRNS_HEAP_POOL_BUFFER_SIZE=512000
	;-DRNS_HEAP_POOL_BUFFER_SIZE=614400
	;-DRNS_HEAP_POOL_BUFFER_SIZE=1024000
	-DRNS_ALTHEAP_POOL_BUFFER_SIZE=2048000
	-DTLSF_DEBUG=1
	;-DRNS_MEM_LOG
lib_deps =
	${env.lib_deps}
	https://github.com/attermann/microStore.git
; Following required to force-include libraries that are marked arduino-only
lib_compat_mode = off

[env:embedded]
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_unflags =
	${env.build_unflags}
	;-fno-rtti
build_flags =
	${env.build_flags}
lib_deps = 
	${env.lib_deps}
	https://github.com/attermann/microStore.git

[env:ttgo-lora32-v21]
extends = env:embedded
platform = espressif32
board = ttgo-lora32-v21
board_build.partitions = no_ota.csv
build_unflags =
	${env:embedded.build_unflags}
build_flags =
	${env:embedded.build_flags}
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env:embedded.lib_deps}
monitor_filters = esp32_exception_decoder

[env:ttgo-t-beam]
extends = env:embedded
platform = espressif32
board = ttgo-t-beam
board_build.partitions = no_ota.csv
;board_build.partitions = huge_app.csv
build_flags =
	${env:embedded.build_flags}
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
