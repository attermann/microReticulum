; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs =
	native17
	ttgo-lora32-v21
	ttgo-t-beam
	lilygo_tbeam_supreme
	heltec_wifi_lora_32_V4
	wiscore_rak4631

[env]
build_unflags =
	-std=gnu++11
	-fno-exceptions
build_flags =
	-std=gnu++17
	-fexceptions
	-Wall
	;-Wextra
	-Wno-missing-field-initializers
	-Wno-format
	-Wno-unused-parameter
	-DUNITY_SUPPORT_64
	; Only define LIBRARY_TEST when testing library directly
	-DLIBRARY_TEST
	;-DNDEBUG
	-DDEBUGLOG_DEFAULT_LOG_LEVEL_TRACE
	-DRNS_LOG_LEVEL=RNS_LOG_LEVEL_TRACE
	-DRNS_LOW_MEMORY_REBOOT
	-DRNS_DEBUG_HEAP
	-DRNS_DEBUG_MEMORY
	-DRNS_DEBUG_METRICS
	-DRNS_DEBUG_PATHSTORE
	-DRNS_USE_FS
	-DRNS_PERSIST_PATHS
	-DRNS_KNOWN_DESTINATIONS_PERSIST
	-DRNS_PERSIST_HASHLIST
	-DRNS_USE_PROVISIONING
	-DRNS_ENABLE_REMOTE_PROVISIONING
	-DUSTORE_USE_UNIVERSALFS
lib_deps = 
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
test_framework = unity
; Following property enables Unity integration testing
test_build_src = true

[env:native]
platform = native
build_flags =
	${env.build_flags}
	-DNATIVE
lib_deps =
	${env.lib_deps}
	https://github.com/attermann/microStore.git
; Following required to force-include libraries that are marked arduino-only
lib_compat_mode = off

[env:native-local]
platform = native
build_flags =
	${env.build_flags}
	-DNATIVE
lib_deps =
	${env.lib_deps}
	microStore=symlink://../microStore
; Following required to force-include libraries that are marked arduino-only
lib_compat_mode = off

