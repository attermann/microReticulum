; also Heltec Wireless Tracker
[env:heltec_wifi_lora_32_V4]
extends = env:embedded
platform = espressif32
board = esp32-s3-devkitc-1
board_build.partitions = no_ota.csv
;board_build.partitions = huge_app.csv
build_flags =
	${env.build_flags}
	-DBOARD_ESP32
	-DMSGPACK_USE_BOOST=OFF
	-DARDUINO_USB_CDC_ON_BOOT=1
	; CBA TEST
    -DBOARD_HAS_PSRAM=1
	;-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_ALLOCATOR
	-DRNS_DEFAULT_ALLOCATOR=RNS_PSRAM_ALLOCATOR
	;-DRNS_CONTAINER_ALLOCATOR=RNS_PSRAM_ALLOCATOR
	-DRNS_CONTAINER_ALLOCATOR=RNS_PSRAM_POOL_ALLOCATOR
	-DRNS_PSRAM_POOL_BUFFER_SIZE=2048000
lib_deps =
	${env:embedded.lib_deps}
monitor_filters = esp32_exception_decoder
upload_speed = 921600

[env:wiscore_rak4631]
extends = env:embedded
platform = nordicnrf52
board = rak4630
board_build.variants_dir = variants
board_build.variant = rak4630
board_build.partitions = no_ota.csv
;build_src_filter = ${env:embedded.build_src_filter}+<../variants/rak4630>
build_unflags =
	${env:embedded.build_unflags}
	-fno-exceptions    ; Required for exception handling on nordicnrf52
	-fno-rtti          ; Required for exception handling on nordicnrf52
	--specs=nano.specs ; Required for exception handling on nordicnrf52
build_flags =
	${env:embedded.build_flags}
	-fexceptions        ; Required for exception handling on nordicnrf52
	-frtti              ; Required for exception handling on nordicnrf52
	--specs=nosys.specs ; Required for exception handling on nordicnrf52
	;-I variants/rak4630
	-DBOARD_NRF52
	-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
	-DRNS_HEAP_POOL_BUFFER_SIZE=204800
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env:embedded.lib_deps}
	adafruit/Adafruit TinyUSB Library

; MCU: Nordic nRF52840 (32-bit ARM Cortex-M4, 64 MHz)
; SRAM: 256 KB
; PSRAM: N/A
; Flash: 1 MB internal
; External Flash Interface: N/A
; LoRa:  Semtech SX1262
; NOTE: Must double-click RESET button (top-left) to enter DFU mode before uploading firmware
[env:lilygo-techo]
extends = env:embedded
platform = nordicnrf52
board = lilygo_t_echo
board_build.variants_dir = variants
board_build.variant = lilygo_t_echo
;board_build.partitions = no_ota.csv
;board_build.filesystem = littlefs
;build_src_filter = ${env:embedded.build_src_filter}+<../variants/lilygo_t_echo>
; REQUIRED for boot. We must add `adafruit/Adafruit TinyUSB Library` to
; lib_deps to get `Serial` / `Adafruit_USBD_CDC` strong defs (the PIO Adafruit
; builder only adds the BSP-bundled TinyUSB to the include path, not the
; compile list). But that creates an archive-linking issue: most TinyUSB
; strong defs sit in archive members that the linker doesn't pull in (the
; weak refs from the BSP's main.cpp don't trigger archive search), leaving
; weak refs unresolved -> BL instructions patched to nop.w -> pre-main fault
; -> bootloader rejects the app -> fast red blink forever. lib_archive=no
; defeats the archive packaging and links every .o unconditionally.
; (Meshtastic avoids the whole mess by using their own framework fork that
; ships TinyUSB compiled into the BSP itself; the same pattern would work
; here but would be a much heavier change.)
lib_archive = no
build_unflags =
	${env:embedded.build_unflags}
	-fno-exceptions    ; Required for exception handling on nordicnrf52
	-fno-rtti          ; Required for exception handling on nordicnrf52
	--specs=nano.specs ; Required for exception handling on nordicnrf52
build_flags =
	${env:embedded.build_flags}
	-fexceptions        ; Required for exception handling on nordicnrf52
	-frtti              ; Required for exception handling on nordicnrf52
	--specs=nosys.specs ; Required for exception handling on nordicnrf52
	;-I variants/lilygo_t_echo
	-DBOARD_NRF52
	-DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
	-DRNS_HEAP_POOL_BUFFER_SIZE=204800
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	${env:embedded.lib_deps}
	adafruit/Adafruit TinyUSB Library
upload_protocol = nrfutil
upload_port = /dev/cu.usbmodem101

